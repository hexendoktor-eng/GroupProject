<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café de Rêve</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Navigation bar-->
<header>
    <a href="index.html"><h1 style="color: white; font-family: 'Georgia', serif; font-size: 3em; letter-spacing: 2px;">Café de Rêve</h1></a>
    <nav>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="check_out.html">Checkout</a>
    </nav>
</header>
<!-- Navigation bar end-->
<main style="text-align: center;">
    <h2 style="font-weight: bold; font-size: 100px">Shopping Cart</h2>
<div id="checkout" style="text-align: center;">
    <table id="cartTable" style="border: #000000 7px solid; border-collapse: collapse; width: 700px; text-align: center; margin: 10px auto;">
        <tr style="border: #ffffff 6px solid; border-collapse: collapse; text-align: center; font-size: 42px;">
            <th>Item</th>
            <th>Price</th>
            <th>Quantity</th>
        </tr>
        <tr>

            <td>Espresso</td>
            <td>$1.50</td>
            <td>
                <label>
                <input type="number" value="0" min="0" max="10" style="scale: 1.4;">
                </label>
            </td>
        </tr>
        <tr>
            <td>Latte</td>
            <td>$4.00</td>
            <td><label>
                <input type="number" value="0" min="0" max="10" style="scale: 1.4;">
            </label></td>
        </tr>
        <tr>
            <td>Breakfast</td>
            <td>$5.00</td>
            <td><label>
                <input type="number" value="0" min="0" max="10" style="scale: 1.4;">
            </label></td>
        </tr>
        <tr>
            <td>Croissant</td>
            <td>$2.50</td>
            <td><label>
                <input type="number" value="0" min="0" max="10" style="scale: 1.4;">
            </label></td>
        </tr>
        <tr>
            <td>Tea</td>
            <td>$3.00</td>
            <td><label>
                <input type="number" value="0" min="0" max="10" style="scale: 1.4;">
            </label></td>
        </tr>
        <tr>
            <td>Smoothie</td>
            <td>$6.00</td>
            <td><label>
                <input type="number" value="0" min="0" max="10" style="scale: 1.4;">
            </label></td>
        </tr>
        <tr>
            <td>Total</td>
            <td id="totalCell">$0.00</td>
            <td><button onclick="reloadCheckout()" id="checkoutButton">Checkout</button></td>
        </tr>

    </table>
</div>
</main>
<script src="checkout.js"></script>

<script>
    document.querySelectorAll('#cartTable input[type="number"]').forEach(input => {
        input.addEventListener('change', checkoutTotal);
        input.addEventListener('input', checkoutTotal);
    });
    checkoutTotal();
</script>
<footer>
    &copy; 2026 Café de Rêve. All rights reserved.
</footer>
</body>
</html>
