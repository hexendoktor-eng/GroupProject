<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We like Coffee Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Navigation bar-->
<header>
    <a href="index.html"><h1 style="color: white; font-family: 'Georgia', serif; font-size: 3em; letter-spacing: 2px;">Café de Rêve</h1></a>
    <nav>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="check_out.html">Checkout</a>
    </nav>
</header>
<!-- Navigation bar end-->
<main>
    <h2><u>Shopping Cart</u></h2>
<div id="checkout" style="display: flex; justify-content: center; align-items: center;
    border-style: solid; border-radius: 10px;">
    <table id="cartTable">
        <tr>
            <th>Item</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total</th>
        </tr>
        <tr>
            <td>Espresso</td>
            <td>$1.50</td>
            <td><input type="number" value="0" min="0" max="10"></td>
        </tr>
        <tr>
            <td>Latte</td>
            <td>$4.00</td>
            <td><input type="number" value="0" min="0" max="10"></td>
        </tr>
        <tr>
            <td>Breakfast</td>
            <td>$5.00</td>
            <td><input type="number" value="0" min="0" max="10"></td>
        </tr>
        <tr>
            <td>Croissant</td>
            <td>$2.50</td>
            <td><input type="number" value="0" min="0" max="10"></td>
        </tr>
        <tr>
            <td>Tea</td>
            <td>$3.00</td>
            <td><input type="number" value="0" min="0" max="10"></td>
        </tr>
        <tr>
            <td>Smoothie</td>
            <td>$6.00</td>
            <td><input type="number" value="0" min="0" max="10"></td>
        </tr>
        <tr>
            <td colspan="3">Total</td>
            <td id="totalCell">$0.00</td>
        </tr>

    </table>
</div>
</main>
<script src="checkout.js"></script>
<script>
    document.querySelectorAll('#cartTable input[type="number"]').forEach(input => {
        input.addEventListener('change', checkoutTotal);
        input.addEventListener('input', checkoutTotal);
    });
    checkoutTotal();
</script>
<footer>
    &copy; 2026 Café de Rêve. All rights reserved.
</footer>
</body>
</html>
