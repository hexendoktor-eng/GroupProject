<h1 style="text-align: center; font-size: 50px; padding-top: 10px;"> Welcome!
</h1>
<!-- This should be where local storage saves name from contact form -->
<!-- Have contact form send user to index.html -->
<p id="user" style="font-size: 70px; text-align: center; font-weight: bolder"></p>

<!-- Script to display name from local storage -->

<script>
document.addEventListener('DOMContentLoaded', function() {
  try {
    const first = localStorage.getItem('firstName');
    const last = localStorage.getItem('lastName');
    const userEl = document.getElementById('user');
    if (userEl && first && last) {
      userEl.textContent = first + ' ' + last;
    }
  } catch (e) {
    // localStorage is unavailable
  }
});
</script>
